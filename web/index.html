<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Template Hub</title>
    <link rel="manifest" href="/manifest.json" />
    <script>
      (() => {
        try {
          const stored = localStorage.getItem('template-hub-theme')
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          const theme = stored === 'light' || stored === 'dark' ? stored : prefersDark ? 'dark' : 'light'
          document.documentElement.classList.toggle('dark', theme === 'dark')
          document.documentElement.style.colorScheme = theme
        } catch {
          document.documentElement.style.colorScheme = 'light'
        }
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Outfit:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
